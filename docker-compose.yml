version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: rabbitmq
    hostname: rabbitmq
    ports:
      - "5672:5672"    # AMQP (для кода)
      - "15672:15672"  # Management UI (для браузера)
    volumes:
      - ./rabbitmq/data:/var/lib/rabbitmq
      - ./rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
      - ./rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/conf.d/99-definitions.conf:ro
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"  # S3 API (для кода)
      - "9001:9001"  # Web Console (для браузера)
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minio_secure_pass_123
    volumes:
      - ./minio/data:/data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local > /dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  create-minio-bucket:
    image: minio/mc:latest
    container_name: create-minio-bucket
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minio_secure_pass_123 &&
      mc mb --ignore-existing myminio/gpx-files &&
      mc mb --ignore-existing myminio/pdf-reports &&
      mc mb --ignore-existing myminio/csv-reports &&
      echo ' Bucket is ready' &&
      exit 0
      "
  analytics:
    image: stdneprov/analytics:latest
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: "minioadmin"
      AWS_SECRET_ACCESS_KEY: "minio_secure_pass_123"
      AWS_REGION: "eu-central-1"
      AWS_ENDPOINT_URL: "http://minio:9000"
      RABBITMQ_USER: "admin"
      RABBITMQ_PASS: "secure_password_123"
      RABBITMQ_HOST: "rabbitmq"
